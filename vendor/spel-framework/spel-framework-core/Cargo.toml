[package]
name = "spel-framework-core"
version = "0.2.0"
edition = "2021"
description = "Core types for the SPEL program framework"

[features]
default = []
idl-gen = ["dep:syn"]
host = ["dep:lee"]

[dependencies]
lee_core = { git = "https://github.com/logos-blockchain/logos-execution-zone.git", rev = "27360cb7d6ccb2bfbcca7d171bab8a3938490264", features = ["host"] }
borsh = { version = "1.0", features = ["derive"] }
thiserror = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"

lee = { git = "https://github.com/logos-blockchain/logos-execution-zone.git", rev = "27360cb7d6ccb2bfbcca7d171bab8a3938490264", optional = true }

syn = { version = "2.0", features = ["full", "extra-traits"], optional = true }
