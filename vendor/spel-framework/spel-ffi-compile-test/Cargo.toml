[package]
name = "spel-ffi-compile-test"
version = "0.1.0"
edition = "2021"
publish = false

[build-dependencies]
spel-client-gen = { path = "../spel-client-gen" }

[dependencies]
lee         = { git = "https://github.com/logos-blockchain/logos-execution-zone.git", rev = "a58fbce2ff48c58b7bb5001b1a27e64b9596ee3a" }
lee_core    = { git = "https://github.com/logos-blockchain/logos-execution-zone.git", rev = "a58fbce2ff48c58b7bb5001b1a27e64b9596ee3a", features = ["host"] }
common      = { git = "https://github.com/logos-blockchain/logos-execution-zone.git", rev = "a58fbce2ff48c58b7bb5001b1a27e64b9596ee3a" }
sequencer_service_rpc = { git = "https://github.com/logos-blockchain/logos-execution-zone.git", rev = "a58fbce2ff48c58b7bb5001b1a27e64b9596ee3a", features = ["client"] }
wallet      = { git = "https://github.com/logos-blockchain/logos-execution-zone.git", rev = "a58fbce2ff48c58b7bb5001b1a27e64b9596ee3a" }
serde_json  = "1"
serde       = { version = "1", features = ["derive"] }
borsh       = "1.5"
tokio       = { version = "1", features = ["rt-multi-thread"] }
hex         = "0.4"
sha2        = "0.10"
