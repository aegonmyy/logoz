[scaffold]
version = "0.2.0"

[repos.lez]
source = "https://github.com/logos-blockchain/logos-execution-zone.git"
pin = "27360cb7d6ccb2bfbcca7d171bab8a3938490264"

[repos.spel]
source = "https://github.com/logos-co/spel.git"
pin = "73fc462eb8f0a4d00f1a846437c627ec2e523f83"

[repos.basecamp]
source = "https://github.com/logos-co/logos-basecamp.git"
pin = "a746cdbc521f72ee22c5a4856fd17a9802bb9d69"
build = "nix-flake"
attr = "app"

[repos.lgpm]
source = "github:logos-co/logos-package-manager"
pin = "e5c25989861f4487c3dc8c7b3bc0062bcbc3221f"
build = "nix-flake"
attr = "cli"

[wallet]
home_dir = ".scaffold/wallet"

[framework]
kind = "default"
version = "0.1.0"

[framework.idl]
spec = "lssa-idl/0.1.0"
path = "idl"

[localnet]
port = 3040
# LP-0017 demo requires the local sequencer to verify REAL Groth16 proofs, so the
# sequencer is spawned with RISC0_DEV_MODE=0 (lgs maps this bool → that env var).
# Fast unit-test iteration uses RISC0_DEV_MODE=1 via the environment instead
# (see Makefile `test` target); it does not read this value.
risc0_dev_mode = false
